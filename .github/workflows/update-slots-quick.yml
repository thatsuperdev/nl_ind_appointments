name: Update Slots — Quick

# Runs every 10 min during embassy hours to keep near-term dates fresh.
# Only checks the next 14 days (~14 API calls). Merges with full-range data.

on:
  schedule:
    - cron: '*/10 6-14 * * 1-6'   # Mon–Sat, 08:00–16:00 Amsterdam (06:00–14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch slot data (quick)
        run: python check_slots.py --quick

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update slots.json (quick) [skip ci]"
            git pull --rebase origin main
            git push
          fi
