name: Update Slots — Frequent

# Covers all release paths:
# - cancellations: regular full-window checks 24/7
# - weekly release: denser checks around Thu 09:00 Amsterdam
# - monthly release: denser checks around the 1st 09:00 Amsterdam
# GitHub cron is UTC; 07:00-08:59 UTC covers 09:00 local in both CEST/CET.
#
# slots.json is NOT committed to git — it's read from and written to Netlify
# Blobs directly, so this can run as often as needed without polluting history.

on:
  schedule:
    - cron: '*/15 * * * *'        # Cancellation watch: 24/7
    - cron: '*/5 7-8 * * 4'       # Weekly Thu 09:00 Amsterdam release window
    - cron: '*/5 7-8 1 * *'       # Monthly 1st 09:00 Amsterdam release window
  workflow_dispatch:

concurrency:
  group: slots-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g netlify-cli

      - name: Fetch existing data (for merge)
        run: |
          if ! netlify blobs:get slots-data slots.json --output slots.json 2>err.log; then
            if grep -qi "not found" err.log; then
              echo "No existing blob yet (first run) — starting from empty state."
              echo '{}' > slots.json
            else
              echo "::error::Failed to fetch existing slots.json from Netlify Blobs (not a not-found error) — aborting to avoid overwriting good data with a partial merge."
              cat err.log
              exit 1
            fi
          fi

      - name: Fetch slot data (quick, merges with existing)
        run: python check_slots.py --quick

      - name: Write updated data to Netlify Blobs
        run: netlify blobs:set slots-data slots.json --input slots.json
