name: Update Slots — Frequent

# Runs every 10 min during embassy hours and checks the full current+next-month
# booking window. This avoids stale future dates surviving from a merge-only
# quick scan.

on:
  schedule:
    - cron: '*/10 6-14 * * 1-6'   # Mon–Sat, 08:00–16:00 Amsterdam (06:00–14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slots-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest data
        run: git pull --rebase origin main

      - name: Fetch slot data (full window)
        run: python check_slots.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update slots.json (frequent) [skip ci]"
            git pull --rebase origin main
            git push
          fi
