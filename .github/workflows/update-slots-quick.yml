name: Update Slots — Frequent

# Covers all release paths:
# - cancellations: regular full-window checks 24/7
# - weekly release: denser checks around Thu 09:00 Amsterdam
# - monthly release: denser checks around the 1st 09:00 Amsterdam
# GitHub cron is UTC; 07:00-08:59 UTC covers 09:00 local in both CEST/CET.

on:
  schedule:
    - cron: '*/15 * * * *'        # Cancellation watch: 24/7
    - cron: '*/5 7-8 * * 4'       # Weekly Thu 09:00 Amsterdam release window
    - cron: '*/5 7-8 1 * *'       # Monthly 1st 09:00 Amsterdam release window
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slots-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest data
        run: git pull --rebase origin main

      - name: Fetch slot data (full window)
        run: python check_slots.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update slots.json (frequent) [skip ci]"
            git pull --rebase origin main
            git push
          fi
