name: Update Slots — Full

# Runs every 2 hours to discover newly released dates across the full 2-month window.
# Makes ~79 API calls. Overwrites slots.json completely (no merge).

on:
  schedule:
    - cron: '0 */2 * * 1-6'   # Mon–Sat, every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch slot data (full)
        run: python check_slots.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update slots.json (full) [skip ci]"
            git pull --rebase origin main
            git push
          fi
