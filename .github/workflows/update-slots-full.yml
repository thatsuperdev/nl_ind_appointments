name: Update Slots — Full

# Runs every 2 hours to discover newly released dates across the full 2-month window.
# Makes ~79 API calls. Overwrites slots.json completely (no merge).
#
# slots.json is NOT committed to git — it's written to Netlify Blobs directly,
# so this can run as often as needed without polluting history.

on:
  schedule:
    - cron: '0 */2 * * 1-6'   # Mon–Sat, every 2 hours
  workflow_dispatch:

concurrency:
  group: slots-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g netlify-cli

      - name: Fetch slot data (full)
        run: python check_slots.py

      - name: Write updated data to Netlify Blobs
        run: netlify blobs:set slots-data slots.json --input slots.json
