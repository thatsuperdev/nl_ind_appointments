name: Update Appointment Slots

on:
  schedule:
    - cron: '*/30 6-14 * * 1-6'  # Every 30 min, 06:00-14:30 UTC (08:00-16:30 Amsterdam), Mon-Sat
  workflow_dispatch:               # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch slot data
        run: python check_slots.py

      - name: Commit slots.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slots.json
          if git diff --cached --quiet; then
            echo "No changes to slots.json"
          else
            git commit -m "chore: update slots.json [skip ci]"
            git push
          fi
